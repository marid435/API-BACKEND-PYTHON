name: Deploy to Railway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall -q src

      - name: Set up Node.js for Railway CLI
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_NAME: ${{ secrets.RAILWAY_ENVIRONMENT_NAME }}
          RAILWAY_SERVICE_NAME: ${{ secrets.RAILWAY_SERVICE_NAME }}
        run: |
          test -n "$RAILWAY_TOKEN" || (echo "Missing secret: RAILWAY_TOKEN" && exit 1)
          test -n "$RAILWAY_PROJECT_ID" || (echo "Missing secret: RAILWAY_PROJECT_ID" && exit 1)
          test -n "$RAILWAY_ENVIRONMENT_NAME" || (echo "Missing secret: RAILWAY_ENVIRONMENT_NAME" && exit 1)
          test -n "$RAILWAY_SERVICE_NAME" || (echo "Missing secret: RAILWAY_SERVICE_NAME" && exit 1)

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --ci \
            --project "${{ secrets.RAILWAY_PROJECT_ID }}" \
            --environment "${{ secrets.RAILWAY_ENVIRONMENT_NAME }}" \
            --service "${{ secrets.RAILWAY_SERVICE_NAME }}"
